<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Assistant</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    
    <style>
        #filePreviewContainer::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="app">
        
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="chats-sidebar" id="chatsSidebar">
            <div class="chats-header">
                <h3>История чатов</h3>
                <button class="close-btn" id="closeChatsBtn" aria-label="Закрыть">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="chat" id="chatContainer">
            <div class="greeting-container" id="greeting">
                <svg class="neural-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                    <path d="M2 12h20"></path>
                </svg>
                <h2>ИИ-Ассистент</h2>
                <p>Отправьте текстовый запрос или прикрепите документ для анализа</p>
            </div>
        </div>

        <div class="input-panel">
            
            <div class="input-controls">
                <button id="chatsBtn" class="icon-btn" aria-label="Чаты">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <button id="modelIsland" class="model-trigger" type="button">
                    <span class="model-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                    </span>
                    <span class="model-name" id="currentModelLabel">Grok-4 Fast</span>
                </button>

                <button id="enhanceBtn" class="icon-btn" aria-label="Улучшить промпт">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </button>
            </div>

            <div id="filePreviewContainer" style="display: none; align-items: center; gap: 8px; overflow-x: auto; width: 100%; max-width: 800px; margin: 0 auto; pointer-events: auto; padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none;">
                
                <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 8px 12px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); max-width: 200px; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; flex-shrink: 0;">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <span id="filePreviewName" style="font-size: 0.9rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;">Имя файла</span>
                    </div>
                    <button id="removeFileBtn" type="button" aria-label="Удалить файл" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; outline: none; margin-left: 8px; flex-shrink: 0;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                
            </div>

            <div class="input-shell">
                <button id="attachBtn" type="button" aria-label="Прикрепить файл" style="position: absolute; left: 8px; bottom: 12px; width: 36px; height: 36px; margin: 0; padding: 0; border: none; background: transparent; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; color: var(--text-muted); outline: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                
                <input type="file" id="fileInput" hidden multiple accept=".txt,.csv,.xlsx,.xls,.pdf,.docx,.png,.jpg,.jpeg">
                
                <div class="query-wrapper" style="width: 100%;">
                    <textarea id="query" placeholder="Введите запрос..." rows="1" style="padding-left: 45px;"></textarea>
                </div>
                
                <button id="sendBtn" type="button" aria-label="Отправить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
